apiVersion: apps/v1
kind: Deployment
metadata:
  name: reference-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reference-data
  template:
    metadata:
      labels:
        app: reference-data
    spec:
      containers:
        - name: reference-data
          image: reference-data:latest
          ports:
            - containerPort: 8080
          env:
            - name: FINNHUB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: finnhub-secret
                  key: api-key
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080